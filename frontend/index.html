<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#D47A31">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ask Eddy">
  <title>Ask Eddy — NCPA Sound</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@1,400;1,700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --primary:#D47A31;
      --primary-dark:#323639;
      --primary-light:#FCD08F;
      --accent:rgba(212,122,49,0.18);
      --accent-dark:#B86020;
      --bg:#F5EDE0;
      --surface:rgba(255,248,238,0.92);
      --border:rgba(212,122,49,0.18);
      --text:#1E2022;
      --muted:#82857E;
      --danger:#c04040;
      --warn-bg:rgba(192,80,60,0.07);
      --warn-border:rgba(192,80,60,0.20);
      --warn-text:#8b3b1a;
      --radius:18px;
      --radius-sm:12px;
      --shadow:0 2px 18px rgba(30,32,34,0.10);
      --safe-top:env(safe-area-inset-top,0px);
      --safe-bottom:env(safe-area-inset-bottom,0px);
    }
    html{height:100%;-webkit-text-size-adjust:100%;overflow:hidden;overscroll-behavior:none}
    body{
      position:fixed;top:0;left:0;right:0;bottom:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
      background:linear-gradient(155deg,#F5EDE0 0%,#FBF3E8 55%,#F0E4D0 100%);
      color:var(--text);overflow:hidden;display:flex;flex-direction:column;overscroll-behavior:none
    }
    .app-bar{
      position:relative;z-index:50;flex:0 0 auto;
      background:rgba(26,25,22,0.45);
      background-image:radial-gradient(ellipse at 50% 0%, rgba(34,32,24,0.6) 0%, rgba(26,25,22,0) 60%), repeating-linear-gradient(90deg, transparent 0px, transparent 6px, rgba(224,123,32,0.12) 6px, rgba(224,123,32,0.12) 7px);
      backdrop-filter:blur(28px) saturate(160%);-webkit-backdrop-filter:blur(28px) saturate(160%);
      border-bottom:3px solid var(--primary);
      padding:calc(12px + var(--safe-top)) 20px 14px;
      color:#fff;box-shadow:0 2px 20px rgba(30,32,34,0.40);
    }
    .app-bar-inner{display:flex;align-items:center;justify-content:center;gap:14px;max-width:640px;margin:0 auto}
    .header-mascot{height:72px;width:auto;flex-shrink:0;display:block}
    .app-bar h1{font-family:'Lora',Georgia,serif;font-style:italic;font-size:36px;font-weight:700;line-height:1.1;letter-spacing:-.5px}
    .ask-word{font-weight:400;color:rgba(255,255,255,0.72)}
    .eddy-word{font-weight:700;color:var(--primary)}
    .app-bar p{font-size:11px;opacity:.55;margin-top:3px;letter-spacing:.2px}

    .page{width:100%;max-width:640px;margin:0 auto;flex:1 1 auto;min-height:0;padding:16px max(16px, env(safe-area-inset-right, 0px)) calc(80px + env(safe-area-inset-bottom, 0px)) max(16px, env(safe-area-inset-left, 0px));overflow-x:hidden;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}

    /* Chat messages */
    .msg{display:flex;gap:10px;margin-bottom:14px;animation:fadeIn .25s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .msg-avatar-user{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:var(--primary-light);color:#fff;align-self:flex-start;margin-top:4px}
    .msg-avatar-sa{width:90px;flex-shrink:0;display:flex;align-items:flex-start;justify-content:center;overflow:visible;align-self:flex-start;padding-top:4px}
    .msg-body{position:relative;flex:0 1 auto;max-width:75%;background:rgba(255,248,238,0.10);backdrop-filter:blur(32px) saturate(180%);-webkit-backdrop-filter:blur(32px) saturate(180%);border:1px solid rgba(212,122,49,0.45);border-radius:20px;padding:12px 14px;font-size:15px;line-height:1.6;box-shadow:0 4px 24px rgba(30,32,34,0.10),inset 0 1px 0 rgba(255,255,255,0.18);white-space:pre-wrap;word-break:break-word;overflow-wrap:break-word}
    .msg-user{flex-direction:row-reverse}
    .msg-user .msg-body{background:rgba(212,122,49,0.10)}
    /* Agent bubble tail — points left toward mascot */
    .msg-assistant .msg-body::before{content:'';position:absolute;left:-10px;top:14px;width:0;height:0;border-top:9px solid transparent;border-bottom:9px solid transparent;border-right:10px solid rgba(212,122,49,0.45)}
    .msg-assistant .msg-body::after{content:'';position:absolute;left:-8px;top:15px;width:0;height:0;border-top:8px solid transparent;border-bottom:8px solid transparent;border-right:9px solid rgba(255,248,238,0.10)}
    /* User bubble tail — points right toward user avatar */
    .msg-user .msg-body::before{content:'';position:absolute;right:-10px;top:14px;width:0;height:0;border-top:9px solid transparent;border-bottom:9px solid transparent;border-left:10px solid rgba(212,122,49,0.45)}
    .msg-user .msg-body::after{content:'';position:absolute;right:-8px;top:15px;width:0;height:0;border-top:8px solid transparent;border-bottom:8px solid transparent;border-left:9px solid rgba(212,122,49,0.10)}

    /* Mascot animations */
    @keyframes idle-bob{0%,100%{transform:translateY(0px) rotate(0deg) scale(1)}25%{transform:translateY(-3px) rotate(-1.5deg) scale(1.01)}50%{transform:translateY(-7px) rotate(0deg) scale(1.03)}75%{transform:translateY(-3px) rotate(1.5deg) scale(1.01)}}
    @keyframes think-swirl{0%{transform:translate(0px,0px) rotate(0deg) scale(1)}25%{transform:translate(6px,-8px) rotate(6deg) scale(1.03)}50%{transform:translate(0px,-14px) rotate(0deg) scale(1.05)}75%{transform:translate(-6px,-8px) rotate(-6deg) scale(1.03)}100%{transform:translate(0px,0px) rotate(0deg) scale(1)}}
    .mascot-idle{transform-origin:bottom center;will-change:transform}
    .mascot-think{animation:think-swirl 3s ease-in-out infinite;transform-origin:bottom center;will-change:transform}

    /* Cards inside messages */
    .card-in-msg{background:#fff;border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-top:10px;max-width:100%;overflow-x:hidden}
    .card-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--primary-dark);margin-bottom:10px}

    /* Crew picker */
    .role-hdr{display:flex;align-items:center;gap:8px;margin-bottom:9px;margin-top:4px}
    .role-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--primary-dark)}
    .role-badge{font-size:10.5px;padding:2px 8px;border-radius:20px;font-weight:600}
    .badge-foh{background:rgba(212,122,49,.13);color:var(--primary-dark)}
    .badge-stage{background:rgba(212,122,49,.10);color:var(--accent-dark)}
    .role-hint{font-size:11.5px;color:var(--muted);margin-bottom:9px}
    .pill-grid{display:flex;flex-wrap:wrap;gap:7px}
    .cpill{position:relative}
    .cpill input{position:absolute;inset:0;width:100%;height:100%;opacity:0;margin:0;cursor:pointer;z-index:1}
    .cpill label{position:relative;z-index:0;display:inline-flex;align-items:center;padding:7px 13px;border-radius:24px;border:1.5px solid var(--border);background:rgba(255,255,255,.75);cursor:pointer;font-size:13px;font-weight:500;color:var(--text);transition:all .14s;user-select:none;line-height:1}
    .cpill label:hover{border-color:var(--primary-light);background:rgba(252,208,143,.18)}
    .foh-pill input:checked+label{background:var(--primary);border-color:var(--accent-dark);color:#fff;box-shadow:0 3px 10px rgba(212,122,49,.35)}
    .stage-pill input:checked+label{background:var(--primary-dark);border-color:var(--primary-dark);color:#fff;box-shadow:0 3px 10px rgba(50,54,57,.30)}
    .none-pill label{color:var(--muted);font-style:italic}
    .none-pill input:checked+label{background:rgba(160,160,170,.12);border-color:rgba(160,160,170,.35);color:var(--muted);box-shadow:none}
    .divider{height:1px;background:var(--border);margin:14px 0}
    .excl-hdr{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:8px}
    .excl-grid{display:flex;flex-wrap:wrap;gap:6px}
    .etag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500}
    .etag-a{background:rgba(192,80,60,.08);color:#8b3020;border:1px solid rgba(192,80,60,.15)}
    .etag-b{background:rgba(140,140,155,.10);color:#777;border:1px solid rgba(140,140,155,.20)}

    /* Quote table */
    .quote-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px;table-layout:auto;max-width:100%}
    .quote-table th,.quote-table td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);word-break:break-word;overflow-wrap:break-word}
    .quote-table th{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
    .quote-table tr:last-child td{border-bottom:none}

    /* Show list */
    .show-item{padding:10px 0;border-bottom:1px solid var(--border)}
    .show-item:last-child{border-bottom:none;padding-bottom:0}
    .show-date{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
    .show-name{font-size:14px;font-weight:600;margin-top:2px}
    .show-meta{font-size:12px;color:var(--muted);margin-top:1px}

    /* Input bar */
    .input-bar{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--surface);backdrop-filter:blur(18px);border-top:1px solid var(--border);padding:10px 14px calc(10px + var(--safe-bottom));display:flex;gap:8px;align-items:center;box-sizing:border-box}
    .mic-btn{width:40px;height:40px;border-radius:50%;border:none;background:var(--primary);color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:opacity .2s}
    .mic-btn:active{opacity:.8}
    .mic-btn.recording{background:var(--danger);animation:pulse 1s infinite}
    .mic-btn.transcribing{background:var(--muted);animation:pulse 1.4s infinite;pointer-events:none}
    @keyframes pulse{0%{opacity:1}50%{opacity:.7}100%{opacity:1}}
    .text-inp{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:20px;font-size:15px;background:rgba(255,248,238,.70);outline:none;transition:border-color .2s,background-color .2s;color:var(--text)}
    .text-inp:focus{border-color:var(--primary-light);background:#fff}
    .text-inp.recognized{border-color:var(--primary);background:#fff;color:var(--text)}
    .send-btn{width:40px;height:40px;border-radius:50%;border:none;background:var(--primary-dark);color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
    .send-btn:disabled{opacity:.4;cursor:not-allowed}

    /* Loading */
    .loading{display:flex;align-items:center;gap:10px;padding:4px 0;color:var(--muted);font-size:14px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .65s linear infinite;flex-shrink:0}

    .no-crew{text-align:center;padding:20px 0 8px;color:var(--muted);font-size:14px}
    .copy-btn{display:inline-block;padding:6px 14px;background:var(--primary);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px}
    .copy-btn:active{opacity:.8}

    /* Slash command drop-up */
    .slash-menu{position:absolute;bottom:100%;left:0;right:0;background:var(--surface);backdrop-filter:blur(18px);border-top:1px solid var(--border);border-bottom:none;overflow:hidden;border-radius:14px 14px 0 0;box-shadow:0 -4px 20px rgba(30,32,34,0.12)}
    .slash-item{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .12s}
    .slash-item:last-child{border-bottom:none}
    .slash-item:active,.slash-item.active{background:rgba(212,122,49,.10)}
    .slash-cmd{font-size:14px;font-weight:700;color:var(--primary);font-family:monospace;letter-spacing:.2px}
    .slash-desc{font-size:13px;color:var(--muted)}
  </style>
</head>
<body>
  <header class="app-bar">
    <div class="app-bar-inner">
      <img src="/images/mascot.png" alt="Eddy" class="header-mascot">
      <div>
        <h1><span class="ask-word">Ask</span> <span class="eddy-word">Eddy</span></h1>
        <p>NCPA Sound Department</p>
      </div>
    </div>
  </header>

  <div class="page">
    <div id="chat"></div>
  </div>

  <div class="input-bar">
    <div class="slash-menu" id="slash-menu" style="display:none"></div>
    <button class="mic-btn" id="mic-btn" title="Hold to speak">🎤</button>
    <input type="text" class="text-inp" id="text-inp" placeholder="Type or hold mic…" autocomplete="off">
    <button class="send-btn" id="send-btn">➤</button>
  </div>

  <script src="js/app.js?v=63"></script>
</body>
</html>
