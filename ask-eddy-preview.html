<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Ask Eddy</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:system-ui,sans-serif}

/* Speaker mesh texture background */
body{
  background-color:#3a3a3a;
  background-image:
    radial-gradient(circle,rgba(255,255,255,0.07) 1px,transparent 1px),
    radial-gradient(circle,rgba(0,0,0,0.3) 0%,transparent 70%);
  background-size:6px 6px, 120px 120px;
}

#app{
  display:flex;flex-direction:column;
  height:100vh;height:100dvh;
  max-width:420px;margin:0 auto;
}

/* ── HEADER ── */
header{
  position:relative;flex-shrink:0;
  display:flex;align-items:flex-end;justify-content:space-between;
  padding:16px 16px 0;
  background:transparent;
  min-height:110px;
  overflow:visible;
}
.header-title{
  font-family:'Lora',serif;
  font-size:38px;
  font-weight:700;
  color:#1A1A1A;
  line-height:1;
  padding-bottom:12px;
  z-index:1;
  text-shadow:0 1px 3px rgba(255,255,255,0.15);
}
.header-title em{font-style:italic}
.mascot-wrap{
  width:110px;height:110px;
  flex-shrink:0;align-self:flex-end;
  position:relative;bottom:-4px;
}
.mascot-wrap svg{width:100%;height:100%;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.5))}

/* ── MESSAGES ── */
#messages{
  flex:1;overflow-y:auto;
  padding:12px 0 8px;
  display:flex;flex-direction:column;gap:10px;
}
#messages::-webkit-scrollbar{width:3px}
#messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:2px}

/* EDDY bubble */
.msg-eddy{display:flex;flex-direction:column;align-items:flex-start;padding:0 12px;gap:4px}
.eddy-row{display:flex;align-items:flex-end;gap:8px}
.eddy-label{
  font-size:11px;font-weight:700;letter-spacing:.3px;
  color:#1A1A1A;
  background:rgba(200,205,208,0.85);
  border-radius:6px 6px 0 0;
  padding:3px 10px;
  margin-left:48px;
  display:inline-block;
}
.eddy-avatar{flex-shrink:0;width:40px;height:40px}
.eddy-bubble{
  max-width:78%;position:relative;
  background:#8C9CA8;
  color:#1A1A1A;
  border-radius:18px 18px 18px 4px;
  padding:11px 15px;
  font-size:14px;line-height:1.55;
  box-shadow:0 2px 8px rgba(0,0,0,0.25);
}
.eddy-bubble::after{
  content:'';position:absolute;bottom:9px;left:-7px;
  border-top:7px solid transparent;
  border-bottom:7px solid transparent;
  border-right:9px solid #8C9CA8;
}

/* USER bubble */
.msg-user{display:flex;align-items:flex-end;justify-content:flex-end;gap:8px;padding:0 12px}
.user-bubble{
  max-width:75%;position:relative;
  background:#FFFFFF;
  color:#1A1A1A;
  border-radius:18px 18px 4px 18px;
  padding:11px 15px;
  font-size:14px;line-height:1.55;
  box-shadow:0 2px 8px rgba(0,0,0,0.2);
}
.user-bubble::after{
  content:'';position:absolute;bottom:9px;right:-7px;
  border-top:7px solid transparent;
  border-bottom:7px solid transparent;
  border-left:9px solid #FFFFFF;
}

/* LOADING */
.msg-loading{display:flex;flex-direction:column;align-items:flex-start;padding:0 12px;gap:4px}
.loading-label{font-size:11px;font-weight:700;color:#1A1A1A;background:rgba(200,205,208,0.85);border-radius:6px 6px 0 0;padding:3px 10px;margin-left:48px;display:inline-block}
.loading-row{display:flex;align-items:flex-end;gap:8px}
.loading-bubble{
  background:#8C9CA8;border-radius:18px 18px 18px 4px;
  padding:12px 16px;
  display:flex;align-items:center;gap:5px;
  box-shadow:0 2px 8px rgba(0,0,0,0.25);
}
.dots span{
  display:inline-block;width:6px;height:6px;border-radius:50%;
  background:rgba(26,26,26,0.5);
  animation:bdot 1.2s ease-in-out infinite;
}
.dots span:nth-child(2){animation-delay:.18s}
.dots span:nth-child(3){animation-delay:.36s}
@keyframes bdot{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

.think{animation:swirl 3s ease-in-out infinite}
@keyframes swirl{0%,100%{transform:rotate(-5deg) translateY(0)}25%{transform:rotate(5deg) translateY(-4px)}50%{transform:rotate(-3deg) translateY(-2px)}75%{transform:rotate(4deg) translateY(-5px)}}

.slide-up{animation:sup .22s ease-out forwards}
@keyframes sup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── SLASH MENU ── */
#slash-menu{
  display:none;position:absolute;bottom:100%;left:0;right:0;margin-bottom:6px;
  background:rgba(240,243,242,0.97);backdrop-filter:blur(10px);
  border:1px solid rgba(0,0,0,0.12);border-radius:14px;
  box-shadow:0 -4px 24px rgba(0,0,0,0.2);
  overflow:hidden;max-height:200px;overflow-y:auto;z-index:50;
}
#slash-menu button{
  width:100%;display:flex;align-items:center;gap:10px;
  padding:10px 14px;background:none;border:none;cursor:pointer;text-align:left;
  transition:background .12s;
}
#slash-menu button:hover{background:rgba(140,156,168,0.2)}
#slash-menu .sc{color:#C5763B;font-family:monospace;font-size:12px;font-weight:700;min-width:120px}
#slash-menu .sd{color:#555;font-size:11px}

/* ── INPUT BAR ── */
#input-bar{
  flex-shrink:0;position:relative;
  padding:10px 12px;
  padding-bottom:max(10px,env(safe-area-inset-bottom));
  background:rgba(50,50,50,0.6);
  backdrop-filter:blur(12px);
  border-top:1px solid rgba(255,255,255,0.08);
}
.input-row{display:flex;align-items:center;gap:8px}

#mic-btn{
  flex-shrink:0;width:44px;height:44px;border-radius:50%;
  background:#C5763B;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:#fff;
  box-shadow:0 2px 10px rgba(197,118,59,0.5);
  transition:transform .15s,filter .15s;
}
#mic-btn:hover{filter:brightness(1.1)}
#mic-btn:active{transform:scale(.91)}
#mic-btn.recording{animation:mpulse 1s ease-in-out infinite}
@keyframes mpulse{0%,100%{box-shadow:0 2px 10px rgba(197,118,59,0.5)}50%{box-shadow:0 2px 22px rgba(197,118,59,0.9)}}

#text-input{
  flex:1;height:44px;border-radius:22px;
  background:#DCE1DF;border:none;
  padding:0 16px;font-size:14px;color:#1A1A1A;outline:none;
  transition:box-shadow .15s;
}
#text-input:focus{box-shadow:0 0 0 3px rgba(197,118,59,0.3)}
#text-input::placeholder{color:#8a9490}

#send-btn{
  flex-shrink:0;width:44px;height:44px;border-radius:50%;
  background:#DD2326;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:#fff;
  box-shadow:0 2px 10px rgba(221,35,38,0.45);
  transition:transform .15s,filter .15s;
}
#send-btn:hover{filter:brightness(1.1);transform:scale(1.05)}
#send-btn:active{transform:scale(.91)}
#send-btn:disabled{opacity:.35;cursor:default;transform:none!important;filter:none}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header>
    <div class="header-title">Ask <em>Eddy</em></div>
    <div class="mascot-wrap" id="hm"></div>
  </header>

  <!-- MESSAGES -->
  <div id="messages" role="log" aria-live="polite"></div>

  <!-- INPUT -->
  <div id="input-bar">
    <div id="slash-menu"></div>
    <div class="input-row">
      <button id="mic-btn" aria-label="Start voice input">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
        </svg>
      </button>
      <input id="text-input" type="text" placeholder="Ask your message..." autocomplete="off" aria-label="Message"/>
      <button id="send-btn" disabled aria-label="Send message">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </button>
    </div>
  </div>
</div>

const CMDS=[
  {cmd:'/clear',desc:'Clear chat',prefix:''},
  {cmd:'/add-show',desc:'Add a new show',prefix:'Add: '},
  {cmd:'/crew',desc:'Crew availability',prefix:'Crew: '},
  {cmd:'/crew-assign',desc:'Assign crew',prefix:'Assign: '},
  {cmd:'/update-CT',desc:'Update call time',prefix:'CT: '},
  {cmd:'/update-sound',desc:'Update sound requirements',prefix:'SR: '},
  {cmd:'/update-venue',desc:'Update venue',prefix:'Venue: '},
  {cmd:'/quote',desc:'Generate quote',prefix:'Quote — Items: '},
  {cmd:'/day-off',desc:'Mark crew day off',prefix:'Day-off — Crew: '},
  {cmd:'/delete-show',desc:'Delete a show',prefix:'Delete: '},
];

const DEMO=[
  "Got it. Checking the schedule now.",
  "Both updated. Confirmed.",
  "Anytime.",
  "Nothing on that date — searching ±7 days.",
  "Pulling crew availability.",
  "Done. Added to the schedule.",
];
let ri=0;

const msgs=document.getElementById('messages');
const inp=document.getElementById('text-input');
const snd=document.getElementById('send-btn');
const mic=document.getElementById('mic-btn');
const sm=document.getElementById('slash-menu');

function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function scrollEnd(){msgs.scrollTop=msgs.scrollHeight}
function updateSend(){snd.disabled=!inp.value.trim()}

function addEddy(text){
  const d=document.createElement('div');
  d.className='msg-eddy slide-up';
  d.innerHTML=`<div class="eddy-label">Top-mact Eddy Eddy</div>
<div class="eddy-row">
  <div class="eddy-avatar">${MS}</div>
  <div class="eddy-bubble">${esc(text)}</div>
</div>`;
  msgs.appendChild(d);scrollEnd();
}

function addUser(text){
  const d=document.createElement('div');
  d.className='msg-user slide-up';
  d.innerHTML=`<div class="user-bubble">${esc(text)}</div>`;
  msgs.appendChild(d);scrollEnd();
}

function addLoading(){
  const d=document.createElement('div');
  d.className='msg-loading';
  d.innerHTML=`<div class="loading-label">Top-mact Eddy Eddy</div>
<div class="loading-row">
  <div class="eddy-avatar think">${MS}</div>
  <div class="loading-bubble"><span style="font-size:13px;color:rgba(26,26,26,0.6);font-style:italic">On it…</span><span class="dots"><span></span><span></span><span></span></span></div>
</div>`;
  msgs.appendChild(d);scrollEnd();
  return d;
}

/* seed */
addEddy("Hey. What do you need?");

function send(){
  const t=inp.value.trim();if(!t)return;
  if(t==='/clear'){msgs.innerHTML='';inp.value='';updateSend();addEddy("Hey. What do you need?");return;}
  addUser(t);inp.value='';updateSend();sm.style.display='none';
  const l=addLoading();
  setTimeout(()=>{l.remove();addEddy(DEMO[ri%DEMO.length]);ri++;},900+Math.random()*600);
}

inp.addEventListener('input',()=>{
  updateSend();
  const v=inp.value;
  if(v.startsWith('/')){
    const f=CMDS.filter(c=>c.cmd.startsWith(v.toLowerCase()));
    if(f.length){
      sm.innerHTML=f.map(c=>`<button onclick="pick('${c.cmd}','${c.prefix}')"><span class="sc">${c.cmd}</span><span class="sd">${c.desc}</span></button>`).join('');
      sm.style.display='block';return;
    }
  }
  sm.style.display='none';
});

inp.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}
  if(e.key==='Escape')sm.style.display='none';
});
snd.addEventListener('click',send);

let rec=false;
mic.addEventListener('click',()=>{
  rec=!rec;
  mic.classList.toggle('recording',rec);
  inp.placeholder=rec?'Listening…':'Ask your message...';
  if(!rec){inp.value='7 June TET. Update SR: Gunx2, PB, HHx2';updateSend();}
});

window.pick=function(cmd,prefix){inp.value=prefix;sm.style.display='none';inp.focus();updateSend()};
</script>
</body>
</html>
